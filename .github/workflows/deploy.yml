name: Deploy Hermes Botyara

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Navigate to the deployment directory (create if not exists)
            mkdir -p ~/.hermes-repo
            cd ~/.hermes-repo
            
            # Clone or pull the latest code
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/p0ntific/hermes-botyara.git .
            fi
            
            # Since the user currently runs via bare python script / systemd --user:
            # We copy the script to the location the systemd service expects (~/.hermes/)
            cp tg_lead_skill.py ~/.hermes/tg_lead_skill.py
            
            # Note: We assume .env is placed inside ~/.hermes/.env manually on the server once.
            
            # Restart the service
            systemctl --user daemon-reload
            systemctl --user restart tg_lead_skill.service
