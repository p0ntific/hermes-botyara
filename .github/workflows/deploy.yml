name: Deploy Hermes Botyara

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy Files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "tg_lead_skill.py,hermes,requirements.txt,hermes-dashboard.service"
          target: "~/.hermes/"

      - name: Sync Runtime Secrets
        uses: appleboy/ssh-action@v1.0.3
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION: ${{ secrets.SESSION }}
          API_ID_PERSONAL: ${{ secrets.API_ID_PERSONAL }}
          API_HASH_PERSONAL: ${{ secrets.API_HASH_PERSONAL }}
          SESSION_PERSONAL: ${{ secrets.SESSION_PERSONAL }}
          TARGET_CHAT: ${{ secrets.TARGET_CHAT }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BOT_CHAT_ID: ${{ secrets.BOT_CHAT_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ secrets.OPENROUTER_MODEL }}
          YANDEX_CLOUD_FOLDER: ${{ secrets.YANDEX_CLOUD_FOLDER }}
          YANDEX_CLOUD_API_KEY: ${{ secrets.YANDEX_CLOUD_API_KEY }}
          YANDEX_CLOUD_MODEL: ${{ secrets.YANDEX_CLOUD_MODEL }}
          LLM_FALLBACK_PROVIDER: ${{ secrets.LLM_FALLBACK_PROVIDER }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: API_ID,API_HASH,SESSION,API_ID_PERSONAL,API_HASH_PERSONAL,SESSION_PERSONAL,TARGET_CHAT,BOT_TOKEN,BOT_CHAT_ID,PROXY_URL,LLM_PROVIDER,OPENROUTER_API_KEY,OPENROUTER_MODEL,YANDEX_CLOUD_FOLDER,YANDEX_CLOUD_API_KEY,YANDEX_CLOUD_MODEL,LLM_FALLBACK_PROVIDER
          script: |
            set -eu
            cd ~/.hermes
            touch .env
            chmod 600 .env

            merge_env() {
              key="$1"
              value="$2"
              tmp="$(mktemp)"
              grep -v "^${key}=" .env > "$tmp" || true
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
              cat "$tmp" > .env
              rm -f "$tmp"
            }

            has_env_value() {
              key="$1"
              value="$(grep -m 1 "^${key}=" .env | cut -d= -f2- || true)"
              [ -n "$value" ]
            }

            merge_env ACCOUNTS_FILE accounts.yaml
            if ! has_env_value DASHBOARD_TOKEN; then
              merge_env DASHBOARD_TOKEN "$(openssl rand -hex 32)"
            fi
            for key in \
              API_ID API_HASH SESSION \
              API_ID_PERSONAL API_HASH_PERSONAL SESSION_PERSONAL \
              TARGET_CHAT BOT_TOKEN BOT_CHAT_ID PROXY_URL \
              LLM_PROVIDER OPENROUTER_API_KEY OPENROUTER_MODEL \
              YANDEX_CLOUD_FOLDER YANDEX_CLOUD_API_KEY YANDEX_CLOUD_MODEL \
              LLM_FALLBACK_PROVIDER
            do
              value="$(printenv "$key" || true)"
              if [ -n "$value" ]; then
                merge_env "$key" "$value"
              fi
            done

            : > accounts.yaml
            printf 'accounts:\n' >> accounts.yaml

            if has_env_value API_ID && has_env_value API_HASH && has_env_value SESSION; then
              printf '  - name: main\n' >> accounts.yaml
              printf '    api_id: ${API_ID}\n' >> accounts.yaml
              printf '    api_hash: ${API_HASH}\n' >> accounts.yaml
              printf '    session: ${SESSION}\n' >> accounts.yaml
              printf '    manager_username: MaksIgitov\n' >> accounts.yaml
              printf '    cold_dm_daily_limit: 10\n' >> accounts.yaml
            fi

            if has_env_value API_ID_PERSONAL && has_env_value API_HASH_PERSONAL && has_env_value SESSION_PERSONAL; then
              printf '  - name: personal\n' >> accounts.yaml
              printf '    api_id: ${API_ID_PERSONAL}\n' >> accounts.yaml
              printf '    api_hash: ${API_HASH_PERSONAL}\n' >> accounts.yaml
              printf '    session: ${SESSION_PERSONAL}\n' >> accounts.yaml
              printf '    manager_username: andrew_pontific\n' >> accounts.yaml
              printf '    cold_dm_daily_limit: 10\n' >> accounts.yaml
            fi

            if [ "$(grep -c 'name:' accounts.yaml)" -eq 0 ]; then
              echo "No Telegram account secrets configured" >&2
              exit 1
            fi

            chmod 600 accounts.yaml
            echo "Configured account names:"
            grep 'name:' accounts.yaml | sed 's/^ *- name: /- /'

      - name: Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Ensure dependencies are up to date
            ~/.local/bin/pip3 install -r ~/.hermes/requirements.txt --user --break-system-packages

            # Restart services
            mkdir -p ~/.config/systemd/user
            cp ~/.hermes/hermes-dashboard.service ~/.config/systemd/user/
            systemctl --user daemon-reload
            systemctl --user restart tg_lead_skill.service
            systemctl --user enable --now hermes-dashboard.service
