name: Inspect Hermes Production Accounts

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Telegram Accounts
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -eu
            cd ~/.hermes
            python3 - <<'PY'
            import asyncio

            from dotenv import load_dotenv
            from telethon import TelegramClient
            from telethon.sessions import StringSession

            from hermes.config import load_settings, load_accounts

            async def main():
                load_dotenv()
                settings = load_settings()
                try:
                    accounts = load_accounts(settings)
                except Exception as e:
                    print(f"load_accounts_error={type(e).__name__}: {e}")
                    print(
                        "env_presence="
                        + ",".join(
                            f"{key}:{bool(__import__('os').getenv(key))}"
                            for key in (
                                "API_ID",
                                "API_HASH",
                                "SESSION",
                                "API_ID_PERSONAL",
                                "API_HASH_PERSONAL",
                                "SESSION_PERSONAL",
                            )
                        )
                    )
                    return
                print(f"accounts_found={len(accounts)}")
                for account in accounts:
                    client = TelegramClient(
                        StringSession(account.session),
                        account.api_id,
                        account.api_hash,
                        proxy=account.proxy,
                    )
                    try:
                        await client.connect()
                        me = await client.get_me()
                        username = getattr(me, "username", "") or ""
                        phone_tail = (getattr(me, "phone", "") or "")[-4:]
                        first_name = getattr(me, "first_name", "") or ""
                        last_name = getattr(me, "last_name", "") or ""
                        print("---")
                        print(f"account={account.name}")
                        print(f"telegram_id={getattr(me, 'id', '')}")
                        print(f"telegram_username=@{username}" if username else "telegram_username=<none>")
                        print(f"name={(first_name + ' ' + last_name).strip()}")
                        print(f"phone_tail=****{phone_tail}" if phone_tail else "phone_tail=<none>")
                        print(f"configured_manager=@{account.manager_username}")
                    finally:
                        await client.disconnect()

            asyncio.run(main())
            PY
