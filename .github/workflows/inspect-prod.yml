name: Inspect Hermes Production

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect Warm Leads
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -eu
            cd ~/.hermes
            python3 - <<'PY'
            import os
            import re
            import sqlite3
            import datetime
            from pathlib import Path

            try:
                from dotenv import load_dotenv
                load_dotenv()
            except Exception:
                pass

            managers = {}
            try:
                import yaml
                accounts_path = Path(os.getenv("ACCOUNTS_FILE", "accounts.yaml"))
                data = yaml.safe_load(accounts_path.read_text()) or {}
                for account in data.get("accounts") or []:
                    name = account.get("name")
                    if name:
                        managers[name] = account.get("manager_username") or os.getenv("MANAGER_USERNAME", "")
            except Exception as e:
                print(f"accounts_yaml_error={type(e).__name__}: {e}")

            db_path = Path(os.getenv("HERMES_DB", "hermes.db"))
            if not db_path.is_absolute():
                db_path = Path.cwd() / db_path

            conn = sqlite3.connect(db_path)
            conn.row_factory = sqlite3.Row

            leads = conn.execute(
                """
                SELECT lead_key, account, status, last_action, last_stage, timestamp, manager_notified_at
                FROM leads
                WHERE status='warm_notified' OR last_action='handoff_to_manager'
                ORDER BY COALESCE(manager_notified_at, timestamp, 0) DESC
                LIMIT 5
                """
            ).fetchall()

            print(f"db={db_path}")
            print(f"warm_leads_found={len(leads)}")
            for i, lead in enumerate(leads, 1):
                lead_key = lead["lead_key"]
                rows = conn.execute(
                    """
                    SELECT direction, text, meta, created_at
                    FROM transcripts
                    WHERE lead_key=?
                    ORDER BY created_at DESC
                    LIMIT 20
                    """,
                    (lead_key,),
                ).fetchall()
                outbound = next((r for r in rows if r["direction"] == "out" and r["text"]), None)
                mentions = re.findall(r"@([A-Za-z0-9_]{3,32})", outbound["text"] if outbound else "")
                ts = lead["manager_notified_at"] or lead["timestamp"] or 0
                when = datetime.datetime.fromtimestamp(ts).isoformat(timespec="seconds") if ts else ""
                print("---")
                print(f"#{i} lead={lead_key}")
                print(f"when={when}")
                print(f"account={lead['account']}")
                print(f"configured_manager=@{managers.get(lead['account'], '')}")
                print(f"status={lead['status']} action={lead['last_action']} stage={lead['last_stage']}")
                print(f"outbound_mentions={','.join('@' + m for m in mentions) if mentions else '<none>'}")
                print(f"last_outbound={(outbound['text'] if outbound else '<none>')[:500]}")
            PY
